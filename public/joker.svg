    <circle class="joker-eye" cx="-15" cy="-15" r="4"/>
    <circle class="joker-eye" cx="15" cy="-15" r="4"/>
    <path class="joker-mouth" d="M -20 10 Q 0 25 20 10"/>
    <path class="joker-collar-point" d="M -50 30 L -30 50 L -10 30 Z"/>
