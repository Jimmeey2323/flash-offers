<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <style>
      .card-face { fill: #fff; stroke: #000; stroke-width: 2; rx: 12; ry: 12; }
      .joker-hat-main { fill: #d4af37; }
      .joker-hat-brim { fill: #b8860b; }
      .joker-face { fill: #f5deb3; }
      .joker-eye { fill: #000; }
      .joker-mouth { fill: none; stroke: #c00; stroke-width: 4; stroke-linecap: round; }
      .joker-collar-point { fill: #9b59b6; }
      .joker-text { font-family: 'Arial', sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>
  <rect class="card-face" x="1" y="1" width="198" height="278"/>
  <g transform="translate(100, 140) scale(1.2)">
